name: Release

run-name: Release v${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version from manifest.json and package.json (without the v prefix)
        required: true
        type: string
      prerelease:
        description: Mark this GitHub release as a prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish GitHub release
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RELEASE_VERSION: ${{ inputs.version }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - name: Install Chromium
        run: bunx playwright install --with-deps chromium
      - run: bun run check
      - run: bun run lint:firefox
      - run: bun run test:e2e:chromium
      - run: bun run test:e2e:firefox
      - run: bun run release:package
      - name: Create draft release with assets
        run: |
          tag="v${RELEASE_VERSION}"
          prerelease=()
          if [[ "${{ inputs.prerelease }}" == "true" ]]; then
            prerelease+=(--prerelease)
          fi
          gh release create "$tag" dist/releases/* \
            --target "$GITHUB_SHA" \
            --title "$tag" \
            --draft \
            --generate-notes \
            --notes-file .github/release-notes.md \
            "${prerelease[@]}"
      - name: Publish completed release
        run: |
          if [[ "${{ inputs.prerelease }}" == "true" ]]; then
            gh release edit "v${RELEASE_VERSION}" --draft=false
          else
            gh release edit "v${RELEASE_VERSION}" --draft=false --latest
          fi
